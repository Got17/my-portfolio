<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1d2e"/>
      <stop offset="100%" stop-color="#0f1117"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0522a"/>
      <stop offset="100%" stop-color="#f08c2a"/>
    </linearGradient>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="31" fill="url(#ringGrad)" opacity="0.85"/>
  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="28" fill="url(#bgGrad)"/>
  <!-- Initials -->
  <text
    x="32"
    y="40"
    text-anchor="middle"
    font-family="'Inter', 'Segoe UI', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-0.5"
  >SL</text>
</svg>